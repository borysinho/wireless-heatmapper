name: Despliegue Azure VM

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "web/**"
      - "manual-usuario/**"
      - "nginx/**"
      - "scripts/deploy/**"
      - "docker-compose.prod.yml"
      - ".env.prod.example"
      - ".github/workflows/deploy-azure-vm.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Etiqueta de imagen a desplegar"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-azure-vm-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/wireless-heatmapper-backend
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/wireless-heatmapper-web
  MANUAL_IMAGE: ghcr.io/${{ github.repository_owner }}/wireless-heatmapper-manual

jobs:
  construir-y-desplegar:
    name: Validar backend/web/manual, construir imagenes y actualizar VM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Normalizar propietario GHCR
        run: |
          echo "OWNER_LC=${OWNER,,}" >> "$GITHUB_ENV"
          echo "COMMIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG_DESPLIEGUE=${{ github.event.inputs.image_tag || 'latest' }}" >> "$GITHUB_ENV"

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Instalar dependencias backend
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Lint backend con Ruff
        run: >
          ruff check
          app/ai/modelo_propagacion.py
          app/ai/reentrenar_optimizador.py
          app/api/v1/escenarios.py
        working-directory: backend

      - name: Pruebas backend
        run: pytest tests/ -v
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci_secret_key_only
          DEBUG: "false"

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Instalar dependencias web
        run: npm ci
        working-directory: web

      - name: Lint web
        run: npm run lint
        working-directory: web

      - name: Build web
        run: npm run build
        working-directory: web

      - name: Pruebas web
        run: npm test
        working-directory: web

      - name: Autenticar en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y publicar backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/wireless-heatmapper-backend:latest
            ghcr.io/${{ env.OWNER_LC }}/wireless-heatmapper-backend:${{ env.COMMIT_SHA }}

      - name: Construir y publicar web
        uses: docker/build-push-action@v6
        with:
          context: web
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/wireless-heatmapper-web:latest
            ghcr.io/${{ env.OWNER_LC }}/wireless-heatmapper-web:${{ env.COMMIT_SHA }}

      - name: Construir y publicar manual
        uses: docker/build-push-action@v6
        with:
          context: manual-usuario
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/wireless-heatmapper-manual:latest
            ghcr.io/${{ env.OWNER_LC }}/wireless-heatmapper-manual:${{ env.COMMIT_SHA }}

      - name: Copiar archivos de despliegue a la VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/nginx.conf,scripts/deploy/actualizar-produccion.sh,.env.prod.example"
          target: "/tmp/wireless-heatmapper-release"
          rm: true

      - name: Actualizar servicios en Azure VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_OWNER: ${{ env.OWNER_LC }}
          IMAGE_TAG: ${{ env.IMAGE_TAG_DESPLIEGUE }}
          GHCR_USUARIO: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          envs: GHCR_OWNER,IMAGE_TAG,GHCR_USUARIO,GHCR_TOKEN
          script: |
            set -euo pipefail
            sudo mkdir -p /opt/wireless-heatmapper/nginx /opt/wireless-heatmapper/scripts/deploy /opt/wireless-heatmapper/.secrets
            sudo cp /tmp/wireless-heatmapper-release/docker-compose.prod.yml /opt/wireless-heatmapper/docker-compose.prod.yml
            sudo cp /tmp/wireless-heatmapper-release/nginx/nginx.conf /opt/wireless-heatmapper/nginx/nginx.conf
            sudo cp /tmp/wireless-heatmapper-release/scripts/deploy/actualizar-produccion.sh /opt/wireless-heatmapper/scripts/deploy/actualizar-produccion.sh
            if [ ! -f /opt/wireless-heatmapper/.env ]; then
              sudo cp /tmp/wireless-heatmapper-release/.env.prod.example /opt/wireless-heatmapper/.env
              echo "Se creo /opt/wireless-heatmapper/.env. Completa secretos antes del siguiente deploy." >&2
              exit 1
            fi
            sudo sed -i "s/^GHCR_OWNER=.*/GHCR_OWNER=${GHCR_OWNER}/" /opt/wireless-heatmapper/.env
            sudo sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" /opt/wireless-heatmapper/.env
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USUARIO" --password-stdin
            sudo chmod +x /opt/wireless-heatmapper/scripts/deploy/actualizar-produccion.sh
            sudo APP_DIR=/opt/wireless-heatmapper /opt/wireless-heatmapper/scripts/deploy/actualizar-produccion.sh
