<svg width="980" height="640" viewBox="0 0 980 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="titulo desc">
  <title id="titulo">Escenarios IA</title>
  <desc id="desc">Reproducción de la pantalla Conjuntos AP propuestos por IA.</desc>
  <rect width="980" height="640" rx="18" fill="#F4F6F8"/>
  <rect x="44" y="40" width="892" height="560" rx="14" fill="#FFFFFF" stroke="#D9E2EC"/>

  <text x="78" y="92" font-family="Inter, Arial" font-size="30" font-weight="850" fill="#17202A">Conjuntos AP propuestos por IA</text>
  <text x="78" y="122" font-family="Inter, Arial" font-size="15" fill="#5D6B7A">Genere alternativas IA derivadas desde un único conjunto AP relevado por el técnico de campo.</text>

  <rect x="78" y="154" width="824" height="210" rx="12" fill="#F8FAFC" stroke="#D9E2EC"/>
  <text x="104" y="194" font-family="Inter, Arial" font-size="18" font-weight="800" fill="#17202A">Fuente de generación</text>
  <text x="104" y="220" font-family="Inter, Arial" font-size="13" fill="#5D6B7A">La IA reutiliza conjuntos AP existentes y crea nuevos conjuntos derivados.</text>
  <rect x="704" y="174" width="158" height="42" rx="8" fill="#2980B9"/>
  <text x="733" y="201" font-family="Inter, Arial" font-size="14" font-weight="850" fill="#FFFFFF">Generar propuestas</text>

  <rect x="104" y="246" width="238" height="86" rx="10" fill="#FFFFFF" stroke="#D9E2EC"/>
  <text x="126" y="276" font-family="Inter, Arial" font-size="14" font-weight="850" fill="#17202A">Plano</text>
  <rect x="126" y="292" width="174" height="26" rx="7" fill="#EBF5FB"/>
  <text x="140" y="310" font-family="Inter, Arial" font-size="11" font-weight="800" fill="#1F618D">Planta baja · Calibrado · 18 punto(s)</text>

  <rect x="374" y="246" width="238" height="86" rx="10" fill="#FFFFFF" stroke="#D9E2EC"/>
  <text x="396" y="276" font-family="Inter, Arial" font-size="14" font-weight="850" fill="#17202A">Conjunto técnico fuente</text>
  <rect x="396" y="292" width="174" height="26" rx="7" fill="#EBF5FB"/>
  <text x="410" y="310" font-family="Inter, Arial" font-size="11" font-weight="800" fill="#1F618D">Móvil · 4 AP(s)</text>

  <rect x="644" y="246" width="218" height="86" rx="10" fill="#FFFFFF" stroke="#D9E2EC"/>
  <text x="666" y="276" font-family="Inter, Arial" font-size="14" font-weight="850" fill="#17202A">Parámetros IA</text>
  <text x="666" y="300" font-family="Inter, Arial" font-size="11.5" fill="#5D6B7A">Umbral objetivo · Resolución</text>
  <text x="666" y="320" font-family="Inter, Arial" font-size="11.5" fill="#5D6B7A">APs propuestos · Cantidad</text>

  <rect x="78" y="394" width="824" height="160" rx="12" fill="#FFFFFF" stroke="#D9E2EC"/>
  <text x="104" y="430" font-family="Inter, Arial" font-size="20" font-weight="850" fill="#17202A">Propuestas IA del plano</text>
  <text x="104" y="456" font-family="Inter, Arial" font-size="13" fill="#5D6B7A">2 conjunto(s) IA asociado(s) al plano seleccionado.</text>
  <rect x="704" y="412" width="158" height="38" rx="8" fill="#FFECEC" stroke="#F2B8B5"/>
  <text x="725" y="436" font-family="Inter, Arial" font-size="12" font-weight="850" fill="#C2413B">Eliminar propuestas IA</text>

  <rect x="104" y="480" width="758" height="40" fill="#F8FAFC"/>
  <text x="124" y="505" font-family="Inter, Arial" font-size="11" font-weight="850" fill="#5D6B7A">Conjunto</text>
  <text x="286" y="505" font-family="Inter, Arial" font-size="11" font-weight="850" fill="#5D6B7A">Plano</text>
  <text x="408" y="505" font-family="Inter, Arial" font-size="11" font-weight="850" fill="#5D6B7A">Vista</text>
  <text x="540" y="505" font-family="Inter, Arial" font-size="11" font-weight="850" fill="#5D6B7A">Origen</text>
  <text x="646" y="505" font-family="Inter, Arial" font-size="11" font-weight="850" fill="#5D6B7A">Banda</text>
  <text x="760" y="505" font-family="Inter, Arial" font-size="11" font-weight="850" fill="#5D6B7A">APs</text>
