# Override para desarrollo local: monta código fuente directamente
services:
  backend:
    build:
      target: builder
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             python -m scripts.seed_dev &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DEBUG: "true"

  web:
    build:
      target: builder
    ports:
      - "80:80"
      - "5173:80"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
      VITE_MANUAL_USUARIO_ROOT: /app/manual-usuario
    volumes:
      - ./web:/app
      - ./manual-usuario:/app/manual-usuario:ro
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 80

  # En desarrollo local se accede por Vite en http://localhost o http://localhost:5173.
  # Nginx queda reservado para producción porque su config usa TLS real.
  nginx:
    profiles:
      - produccion-local
