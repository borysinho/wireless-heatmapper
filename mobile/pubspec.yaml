name: heatmapper
description: "Wireless HeatMapper — App móvil Android para relevamiento y análisis de cobertura WiFi. Bulldog Tech. / UAGRM FICCT Grupo 24."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # Estado y arquitectura
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Persistencia local
  sqflite: ^2.4.2
  path: ^1.9.1

  # Seguridad de sesión
  flutter_secure_storage: ^9.2.4

  # Navegación
  go_router: ^14.8.1

  # Importación de archivos
  file_picker: ^8.3.7

  # Renderizado PDF
  pdfx: ^2.9.0

  # Inyección de dependencias
  get_it: ^8.0.3

  # Hash de contraseñas (bcrypt via pointycastle)
  pointycastle: ^3.9.1

  # Iconos Material
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
