upstream backend {
    server backend:8000;
}

upstream web {
    server web:80;
}

upstream manual {
    server manual:80;
}

server {
    listen 80;
    server_name wireless-heatmapper-g24.eastus2.cloudapp.azure.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://wireless-heatmapper-g24.eastus2.cloudapp.azure.com$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name wireless-heatmapper-g24.eastus2.cloudapp.azure.com;

    ssl_certificate /etc/letsencrypt/live/wireless-heatmapper-g24.eastus2.cloudapp.azure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wireless-heatmapper-g24.eastus2.cloudapp.azure.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 50M;

    # Docs de Swagger/OpenAPI — se sirven con prefijo /api en FastAPI, NO stripear
    location /api/docs {
        proxy_pass         http://backend/api/docs;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }
    location /api/openapi.json {
        proxy_pass         http://backend/api/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # Backend API — stripea /api/ antes de pasar al backend
    location /api/ {
        proxy_pass         http://backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Redireccion canonica del manual
    location = /manual {
        return 301 /manual/;
    }

    # Manual de usuario publicado como SPA estatica separada
    location /manual/ {
        proxy_pass         http://manual/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend React SPA
    location / {
        proxy_pass         http://web/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
