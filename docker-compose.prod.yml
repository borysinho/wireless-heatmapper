services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - heatmapper-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    image: ghcr.io/${GHCR_OWNER}/wireless-heatmapper-backend:${IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS}
      STORAGE_ROOT: ${STORAGE_ROOT:-/var/lib/heatmapper/planos}
      STORAGE_URL_SECRET: ${STORAGE_URL_SECRET}
      STORAGE_URL_TTL_SECONDS: ${STORAGE_URL_TTL_SECONDS:-3600}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-}
      EMAIL_NOTIFICATIONS_ENABLED: ${EMAIL_NOTIFICATIONS_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Wireless HeatMapper}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_POLIGONO_DEPLOYMENT: ${AZURE_OPENAI_POLIGONO_DEPLOYMENT:-whm-poligono-gpt5-nano}
      AZURE_OPENAI_POLIGONO_MAX_PX: ${AZURE_OPENAI_POLIGONO_MAX_PX:-768}
      AZURE_OPENAI_POLIGONO_TIMEOUT_SECONDS: ${AZURE_OPENAI_POLIGONO_TIMEOUT_SECONDS:-30}
      AZURE_OPENAI_CHATBOT_DEPLOYMENT: ${AZURE_OPENAI_CHATBOT_DEPLOYMENT:-}
      AZURE_OPENAI_CHATBOT_TIMEOUT_SECONDS: ${AZURE_OPENAI_CHATBOT_TIMEOUT_SECONDS:-20}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CREDENTIALS_PATH: /run/secrets/firebase-admin.json
    volumes:
      - planos_data:/var/lib/heatmapper/planos
      - ./.secrets:/run/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - heatmapper-net
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')"',
        ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    image: ghcr.io/${GHCR_OWNER}/wireless-heatmapper-web:${IMAGE_TAG:-latest}
    networks:
      - heatmapper-net
    restart: unless-stopped

  manual:
    image: ghcr.io/${GHCR_OWNER}/wireless-heatmapper-manual:${IMAGE_TAG:-latest}
    networks:
      - heatmapper-net
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - web
      - manual
    networks:
      - heatmapper-net
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    profiles:
      - tls
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./certbot/lib:/var/lib/letsencrypt
    command: renew --webroot -w /var/www/certbot --quiet

volumes:
  postgres_data:
  planos_data:

networks:
  heatmapper-net:
    driver: bridge
